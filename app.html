<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#05020a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>ISOLA — Connect</title>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=JetBrains+Mono:wght@400&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: { extend: {
                fontFamily: { sans: ['Inter','sans-serif'], serif: ['Playfair Display','serif'], mono: ['JetBrains Mono','monospace'] },
                colors: { base: '#05020a' }
            }}
        }
    </script>
    <link rel="stylesheet" href="css/app.css">
</head>
<body>
    <canvas id="particles"></canvas>

    <!-- Header -->
    <header class="fixed top-0 z-50 w-full px-6 md:px-12 py-5 flex justify-between items-center" style="padding-top: max(1.25rem, env(safe-area-inset-top));">
        <a href="index.html" class="text-xl font-serif tracking-widest text-white/90 no-underline">ISOLA</a>
    </header>

    <!-- ==================== SCREEN: PAIRING ==================== -->
    <div id="screenPairing" class="screen active flex-col items-center justify-center min-h-[100dvh] px-4 relative z-10">
        <div class="text-center max-w-sm mx-auto">
            <h1 class="text-3xl md:text-4xl font-serif font-light tracking-wide text-white/90 mb-2">Connect hearts</h1>
            <p class="text-white/40 text-sm mb-12">Create a room or join your partner</p>

            <!-- Create room -->
            <button id="btnCreate" class="btn-primary w-full max-w-xs mb-4" onclick="handleCreate()">Create a room</button>

            <!-- Divider -->
            <div class="flex items-center gap-4 my-6 max-w-xs mx-auto">
                <div class="flex-1 h-[1px] bg-white/10"></div>
                <span class="text-white/20 text-xs font-mono">or</span>
                <div class="flex-1 h-[1px] bg-white/10"></div>
            </div>

            <!-- Join room -->
            <div class="flex flex-col items-center gap-3">
                <input id="joinInput" type="text" class="code-input" placeholder="ENTER CODE" maxlength="6" autocomplete="off" spellcheck="false">
                <button id="btnJoin" class="btn-outline w-full max-w-xs" onclick="handleJoin()">Join</button>
            </div>

            <p id="pairingError" class="text-rose-400/80 text-xs mt-6 hidden"></p>
        </div>
    </div>

    <!-- ==================== SCREEN: WAITING ==================== -->
    <div id="screenWaiting" class="screen flex-col items-center justify-center min-h-[100dvh] px-4 relative z-10">
        <div class="text-center max-w-sm mx-auto">
            <h1 class="text-3xl md:text-4xl font-serif font-light tracking-wide text-white/90 mb-3">Waiting for your partner</h1>
            <p class="text-white/40 text-sm mb-10">Share this code with them</p>

            <div id="inviteCodeDisplay" class="font-mono text-4xl tracking-[0.4em] text-white/90 mb-6 drop-shadow-[0_0_15px_rgba(244,63,94,0.3)]"></div>

            <button id="btnCopy" class="btn-outline text-xs" onclick="handleCopy()">Copy invite link</button>
            <p id="waitStatus" class="status-msg text-white/20 mt-8">listening for connection...</p>
        </div>
    </div>

    <!-- ==================== SCREEN: LIVE VISUALIZATION ==================== -->
    <div id="screenLive" class="screen flex-col items-center justify-center min-h-[100dvh] px-4 relative z-10">

        <!-- Sync flash -->
        <div id="liveFlash" class="fixed inset-0 bg-gradient-to-r from-rose-500/20 via-fuchsia-400/20 to-purple-500/20 opacity-0 pointer-events-none z-50"></div>

        <div class="text-center mb-8">
            <p id="liveStatus" class="status-msg text-white/20">listening</p>
        </div>

        <!-- Visualization area -->
        <div class="relative w-full max-w-[600px] h-48 flex items-center justify-center">
            <!-- Center line -->
            <div class="absolute w-full max-w-[400px] h-[1px] bg-gradient-to-r from-transparent via-white/10 to-transparent"></div>

            <!-- Left node (You) -->
            <div id="liveNodeLeft" class="absolute z-20 flex flex-col items-center" style="will-change: transform, opacity; transition: transform 0.4s cubic-bezier(0.25,0.1,0.25,1), opacity 0.4s ease;">
                <div class="flex flex-col items-center mb-3">
                    <span id="liveBpmLeft" class="text-rose-300/90 font-mono text-xs tracking-[0.2em] drop-shadow-[0_0_8px_rgba(243,118,142,0.5)] tabular-nums">-- BPM</span>
                    <div class="w-[1px] h-3 bg-gradient-to-b from-rose-400/50 to-transparent mt-1"></div>
                </div>
                <div id="livePulseLeft" class="relative flex items-center justify-center w-4 h-4">
                    <div class="absolute w-3 h-3 bg-rose-400 rounded-full shadow-[0_0_20px_4px_rgba(244,63,94,0.7)]" style="will-change:transform;"></div>
                    <div class="absolute w-1 h-1 bg-white rounded-full opacity-80"></div>
                </div>
                <span class="text-white/30 text-[10px] tracking-[0.3em] uppercase mt-3 font-sans">you</span>
            </div>

            <!-- Right node (Partner) -->
            <div id="liveNodeRight" class="absolute z-20 flex flex-col items-center" style="will-change: transform, opacity; transition: transform 0.4s cubic-bezier(0.25,0.1,0.25,1), opacity 0.4s ease;">
                <div id="livePulseRight" class="relative flex items-center justify-center w-4 h-4">
                    <div class="absolute w-3 h-3 bg-fuchsia-400 rounded-full shadow-[0_0_20px_4px_rgba(217,70,239,0.7)]" style="will-change:transform;"></div>
                    <div class="absolute w-1 h-1 bg-white rounded-full opacity-80"></div>
                </div>
                <span class="text-white/30 text-[10px] tracking-[0.3em] uppercase mt-3 font-sans">partner</span>
                <div class="flex flex-col items-center mt-1">
                    <div class="w-[1px] h-3 bg-gradient-to-t from-fuchsia-400/50 to-transparent mb-1"></div>
                    <span id="liveBpmRight" class="text-fuchsia-300/90 font-mono text-xs tracking-[0.2em] drop-shadow-[0_0_8px_rgba(217,70,239,0.5)] tabular-nums">-- BPM</span>
                </div>
            </div>

            <!-- Burst effects -->
            <div class="absolute z-30 flex items-center justify-center mix-blend-screen pointer-events-none">
                <div id="liveBurstGlow" class="absolute w-40 md:w-64 h-40 md:h-64 rounded-full bg-gradient-to-tr from-rose-500 to-purple-600 blur-[30px] md:blur-[40px] burst-glow"></div>
                <div id="liveBurstCore" class="absolute w-20 md:w-32 h-20 md:h-32 rounded-full bg-gradient-to-r from-rose-300 to-fuchsia-300 blur-[10px] md:blur-[15px] burst-core"></div>
                <div id="liveBurstWhite" class="absolute w-8 md:w-12 h-8 md:h-12 rounded-full bg-white blur-[3px] md:blur-[4px] burst-white"></div>
            </div>
        </div>

        <!-- Memory button -->
        <div class="mt-12">
            <a href="#" id="btnMemory" class="btn-outline text-xs flex items-center gap-2" onclick="goToMemory(event)">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
                Create a memory
            </a>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/supabase.js"></script>
    <script src="js/heartbeat.js"></script>
    <script src="js/room.js"></script>
    <script>
    (function() {
        'use strict';

        // ---- State ----
        let roomId = null;
        let userId = null;
        let inviteCode = null;
        let mySimulator = null;
        let partnerBpm = null;
        let partnerLastSeen = 0;
        let writeInterval = null;
        let animFrame = null;

        // ---- Screens ----
        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        // ---- Auto-join from URL ----
        const params = new URLSearchParams(window.location.search);
        const urlRoom = params.get('room');
        if (urlRoom) {
            document.getElementById('joinInput').value = urlRoom;
        }

        // ---- Create Room ----
        window.handleCreate = async function() {
            const btn = document.getElementById('btnCreate');
            btn.disabled = true; btn.textContent = 'Creating...';
            try {
                const result = await createRoom();
                roomId = result.room.id;
                userId = result.userId;
                inviteCode = result.inviteCode;
                sessionStorage.setItem('isola_room', roomId);
                sessionStorage.setItem('isola_user', userId);

                document.getElementById('inviteCodeDisplay').textContent = inviteCode;
                showScreen('screenWaiting');

                // Listen for partner to join
                subscribeToRoomJoin(roomId, () => {
                    startLive();
                });
            } catch (e) {
                showError(e.message);
                btn.disabled = false; btn.textContent = 'Create a room';
            }
        };

        // ---- Join Room ----
        window.handleJoin = async function() {
            const code = document.getElementById('joinInput').value.trim();
            if (!code || code.length < 4) { showError('Enter a valid code'); return; }
            const btn = document.getElementById('btnJoin');
            btn.disabled = true; btn.textContent = 'Joining...';
            try {
                const result = await joinRoom(code);
                roomId = result.room.id;
                userId = result.userId;
                sessionStorage.setItem('isola_room', roomId);
                sessionStorage.setItem('isola_user', userId);
                startLive();
            } catch (e) {
                showError(e.message);
                btn.disabled = false; btn.textContent = 'Join';
            }
        };

        // Enter key to join
        document.getElementById('joinInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') window.handleJoin();
        });

        // ---- Copy Link ----
        window.handleCopy = async function() {
            const url = window.location.origin + '/app.html?room=' + inviteCode;
            try {
                await navigator.clipboard.writeText(url);
                const btn = document.getElementById('btnCopy');
                btn.textContent = 'Copied!';
                btn.classList.add('copied');
                setTimeout(() => { btn.textContent = 'Copy invite link'; btn.classList.remove('copied'); }, 2000);
            } catch (_) {
                // Fallback
                prompt('Share this link:', url);
            }
        };

        function showError(msg) {
            const el = document.getElementById('pairingError');
            el.textContent = msg;
            el.classList.remove('hidden');
            setTimeout(() => el.classList.add('hidden'), 4000);
        }

        // ---- Live Visualization ----
        function startLive() {
            showScreen('screenLive');
            mySimulator = new HeartbeatSimulator(62, 78);

            // Elements
            const bpmL = document.getElementById('liveBpmLeft');
            const bpmR = document.getElementById('liveBpmRight');
            const nodeL = document.getElementById('liveNodeLeft');
            const nodeR = document.getElementById('liveNodeRight');
            const pulseL = document.getElementById('livePulseLeft');
            const pulseR = document.getElementById('livePulseRight');
            const coreL = pulseL.querySelector('div');
            const coreR = pulseR.querySelector('div');
            const status = document.getElementById('liveStatus');
            const flash = document.getElementById('liveFlash');
            const burstG = document.getElementById('liveBurstGlow');
            const burstC = document.getElementById('liveBurstCore');
            const burstW = document.getElementById('liveBurstWhite');

            let lastBeatL = 0, lastBeatR = 0;
            let lastPosUpdate = 0, lastBpmUpdate = 0;
            let lastTime = performance.now();
            let synced = false;

            // Subscribe to partner heartbeats
            subscribeToHeartbeats(roomId, userId, (bpm, ts) => {
                partnerBpm = bpm;
                partnerLastSeen = Date.now();
            });

            // Write my BPM to Supabase every 3 seconds
            writeInterval = setInterval(() => {
                if (mySimulator) {
                    writeHeartbeat(roomId, userId, mySimulator.current);
                }
            }, 3000);

            function getSpread() {
                const vw = window.innerWidth;
                if (vw < 400) return 60;
                if (vw < 640) return 80;
                return 110;
            }

            function createRing(parent, color) {
                const ring = document.createElement('div');
                ring.className = 'pulse-ring';
                ring.style.cssText = `width:12px;height:12px;left:50%;top:50%;margin-left:-6px;margin-top:-6px;border:1.5px solid ${color};`;
                parent.appendChild(ring);
                setTimeout(() => ring.remove(), 1900);
            }

            function triggerSyncBurst() {
                burstG.classList.add('active');
                burstC.classList.add('active');
                burstW.classList.add('active');
                flash.style.animation = 'syncFlash 1.2s ease-out forwards';
                setTimeout(() => {
                    burstG.classList.remove('active'); burstG.classList.add('fade');
                    burstC.classList.remove('active'); burstC.classList.add('fade');
                    burstW.classList.remove('active'); burstW.classList.add('fade');
                }, 600);
                setTimeout(() => {
                    burstG.classList.remove('fade');
                    burstC.classList.remove('fade');
                    burstW.classList.remove('fade');
                    flash.style.animation = '';
                }, 3500);
            }

            function loop() {
                const now = performance.now();
                const dt = (now - lastTime) / 1000;
                lastTime = now;

                const myBpm = mySimulator.update(dt);
                const pBpm = partnerBpm || null;
                const partnerFresh = pBpm && (Date.now() - partnerLastSeen < 15000);
                const spread = getSpread();

                // Update BPM display (throttled)
                if (now - lastBpmUpdate > 250) {
                    bpmL.textContent = myBpm + ' BPM';
                    bpmR.textContent = partnerFresh ? pBpm + ' BPM' : '-- BPM';

                    if (partnerFresh) {
                        const diff = Math.abs(myBpm - pBpm);
                        if (diff <= 5) {
                            status.textContent = 'hearts aligned';
                            status.style.color = 'rgba(244,114,182,0.5)';
                            if (!synced) { synced = true; triggerSyncBurst(); }
                        } else {
                            synced = false;
                            if (diff <= 12) { status.textContent = 'converging'; status.style.color = 'rgba(255,255,255,0.25)'; }
                            else { status.textContent = 'listening'; status.style.color = 'rgba(255,255,255,0.15)'; }
                        }
                    } else {
                        status.textContent = partnerBpm ? 'partner away' : 'waiting for partner';
                        status.style.color = 'rgba(255,255,255,0.15)';
                        synced = false;
                    }
                    lastBpmUpdate = now;
                }

                // Node positions (throttled)
                if (now - lastPosUpdate > 66) {
                    const hasPartner = partnerFresh;
                    const diff = hasPartner ? Math.abs(myBpm - pBpm) : 999;
                    let posScale = hasPartner ? Math.min(diff / 30, 1) : 1;
                    const leftX = -spread * posScale - 10;
                    const rightX = spread * posScale + 10;
                    nodeL.style.transform = `translateX(${leftX}px)`;
                    nodeL.style.opacity = '1';
                    nodeR.style.transform = `translateX(${rightX}px)`;
                    nodeR.style.opacity = hasPartner ? '1' : '0.3';
                    lastPosUpdate = now;
                }

                // Pulse beats
                const intervalL = (60 / myBpm) * 1000;
                if (now - lastBeatL > intervalL) {
                    createRing(pulseL, 'rgba(251,113,133,0.5)');
                    lastBeatL = now;
                    if (coreL) { coreL.style.transition='transform 0.12s ease-out'; coreL.style.transform='scale(1.4)';
                        setTimeout(()=>{coreL.style.transition='transform 0.35s ease';coreL.style.transform='scale(1)';},120); }
                }
                if (partnerFresh && pBpm) {
                    const intervalR = (60 / pBpm) * 1000;
                    if (now - lastBeatR > intervalR) {
                        createRing(pulseR, 'rgba(192,132,252,0.5)');
                        lastBeatR = now;
                        if (coreR) { coreR.style.transition='transform 0.12s ease-out'; coreR.style.transform='scale(1.4)';
                            setTimeout(()=>{coreR.style.transition='transform 0.35s ease';coreR.style.transform='scale(1)';},120); }
                    }
                }

                animFrame = requestAnimationFrame(loop);
            }

            // Start
            loop();
        }

        // ---- Memory navigation ----
        window.goToMemory = function(e) {
            e.preventDefault();
            window.location.href = 'memory.html';
        };

        // ---- Particles (same as landing page, lighter) ----
        const canvas = document.getElementById('particles');
        const ctx = canvas.getContext('2d');
        let particles = [];
        function initParticles() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            particles = [];
            const isMobile = canvas.width < 640;
            const count = Math.floor((canvas.width * canvas.height) / (isMobile ? 60000 : 30000));
            for (let i = 0; i < count; i++) {
                particles.push({
                    x: Math.random() * canvas.width, y: Math.random() * canvas.height,
                    vx: (Math.random() - 0.5) * 0.2, vy: -0.05 - Math.random() * 0.15,
                    size: 0.5 + Math.random() * 1, opacity: 0.08 + Math.random() * 0.15,
                    phase: Math.random() * Math.PI * 2,
                });
            }
        }
        function drawParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const t = performance.now() * 0.001;
            particles.forEach(p => {
                p.x += p.vx; p.y += p.vy;
                if (p.y < -10) { p.y = canvas.height + 10; p.x = Math.random() * canvas.width; }
                if (p.x < -10) p.x = canvas.width + 10;
                if (p.x > canvas.width + 10) p.x = -10;
                const flicker = 0.7 + 0.3 * Math.sin(t * 0.5 + p.phase);
                ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255,255,255,${p.opacity * flicker})`; ctx.fill();
            });
            requestAnimationFrame(drawParticles);
        }
        window.addEventListener('resize', initParticles);
        initParticles();
        drawParticles();
    })();
    </script>
</body>
</html>
