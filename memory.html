<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#05020a">
    <title>ISOLA — Create a Memory</title>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=JetBrains+Mono:wght@400&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: { extend: {
                fontFamily: { sans: ['Inter','sans-serif'], serif: ['Playfair Display','serif'], mono: ['JetBrains Mono','monospace'] },
                colors: { base: '#05020a' }
            }}
        }
    </script>
    <link rel="stylesheet" href="css/app.css">
    <style>
        @keyframes memoryPulse {
            0% { transform: scale(0.8); opacity: 0.6; }
            50% { transform: scale(2); opacity: 0; }
            100% { transform: scale(2); opacity: 0; }
        }
    </style>
</head>
<body>
    <canvas id="particles"></canvas>

    <!-- Header -->
    <header class="fixed top-0 z-50 w-full px-6 md:px-12 py-5 flex justify-between items-center" style="padding-top: max(1.25rem, env(safe-area-inset-top));">
        <a href="app.html" class="text-xl font-serif tracking-widest text-white/90 no-underline">ISOLA</a>
        <a href="app.html" class="text-white/40 text-sm hover:text-white/70 transition-colors no-underline">&larr; Back</a>
    </header>

    <main class="flex flex-col items-center justify-start min-h-[100dvh] pt-24 pb-12 px-4 relative z-10">
        <div class="max-w-lg w-full">
            <div class="text-center mb-10">
                <h1 class="text-3xl md:text-4xl font-serif font-light tracking-wide text-white/90 mb-2">Create a memory</h1>
                <p class="text-white/40 text-sm">Upload a photo and give it a heartbeat</p>
            </div>

            <!-- Upload area -->
            <div id="uploadArea" class="relative border-2 border-dashed border-white/10 rounded-xl p-8 md:p-12 text-center cursor-pointer hover:border-white/25 transition-colors mb-6" onclick="document.getElementById('photoInput').click()">
                <input id="photoInput" type="file" accept="image/*" class="hidden" onchange="handlePhotoUpload(event)">
                <svg class="w-8 h-8 mx-auto text-white/20 mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                </svg>
                <p class="text-white/30 text-sm">Tap to upload a photo</p>
                <p class="text-white/15 text-xs mt-1">JPG, PNG, HEIC</p>
            </div>

            <!-- Preview + controls (hidden until photo uploaded) -->
            <div id="memoryPreview" class="hidden">
                <!-- Photo with pulse overlay -->
                <div class="memory-canvas-wrap mb-6">
                    <div class="relative">
                        <img id="previewImg" class="w-full rounded-xl" alt="Your memory">
                        <div class="absolute inset-0 bg-gradient-to-t from-base/80 via-transparent to-transparent rounded-xl"></div>

                        <!-- Pulse dots overlay -->
                        <div class="absolute inset-0 flex items-center justify-center">
                            <div class="absolute" style="left: 35%; top: 45%;">
                                <div class="w-3 h-3 bg-rose-400/60 rounded-full shadow-[0_0_20px_6px_rgba(244,63,94,0.4)]"></div>
                                <div class="absolute inset-0 w-3 h-3 rounded-full border border-rose-400/30" style="animation: memoryPulse 1.5s infinite;"></div>
                                <div class="absolute inset-0 w-3 h-3 rounded-full border border-rose-400/20" style="animation: memoryPulse 1.5s infinite 0.5s;"></div>
                            </div>
                            <div class="absolute" style="left: 60%; top: 45%;">
                                <div class="w-3 h-3 bg-fuchsia-400/60 rounded-full shadow-[0_0_20px_6px_rgba(217,70,239,0.4)]"></div>
                                <div class="absolute inset-0 w-3 h-3 rounded-full border border-fuchsia-400/30" style="animation: memoryPulse 1.3s infinite;"></div>
                                <div class="absolute inset-0 w-3 h-3 rounded-full border border-fuchsia-400/20" style="animation: memoryPulse 1.3s infinite 0.43s;"></div>
                            </div>
                        </div>

                        <!-- Synced badge -->
                        <div class="absolute top-4 right-4 px-3 py-1 rounded-full bg-white/5 backdrop-blur-sm border border-white/10">
                            <span class="text-white/70 text-[10px] font-mono tracking-[0.2em] uppercase">synced</span>
                        </div>

                        <!-- Bottom info -->
                        <div class="absolute bottom-0 left-0 right-0 p-5">
                            <input id="memoryTitle" type="text" placeholder="Name this moment..." class="bg-transparent border-none text-white/90 font-serif text-lg w-full outline-none placeholder:text-white/30" value="">
                            <p id="memoryDate" class="text-white/40 font-mono text-xs mt-1"></p>
                        </div>
                    </div>
                </div>

                <!-- BPM display -->
                <div class="flex items-center justify-center gap-8 mb-8">
                    <div class="flex items-center gap-2">
                        <div class="w-2 h-2 bg-rose-400 rounded-full shadow-[0_0_6px_rgba(244,63,94,0.5)]"></div>
                        <span id="memBpmLeft" class="text-rose-300/80 font-mono text-xs">-- bpm</span>
                    </div>
                    <div class="flex items-center gap-2">
                        <div class="w-2 h-2 bg-fuchsia-400 rounded-full shadow-[0_0_6px_rgba(217,70,239,0.5)]"></div>
                        <span id="memBpmRight" class="text-fuchsia-300/80 font-mono text-xs">-- bpm</span>
                    </div>
                </div>

                <!-- Actions -->
                <div class="flex gap-3 justify-center">
                    <button class="btn-primary" onclick="saveMemory()">Save memory</button>
                    <button class="btn-outline text-xs" onclick="resetMemory()">Choose different photo</button>
                </div>

                <p id="memoryStatus" class="text-center text-white/30 text-xs mt-6 hidden"></p>
            </div>
        </div>
    </main>

    <script src="js/supabase.js"></script>
    <script src="js/heartbeat.js"></script>
    <script src="js/room.js"></script>
    <script>
    (function() {
        'use strict';

        const roomId = sessionStorage.getItem('isola_room');
        const userId = sessionStorage.getItem('isola_user');

        // Redirect if no room
        if (!roomId) {
            window.location.href = 'app.html';
            return;
        }

        // ---- Photo Upload ----
        window.handlePhotoUpload = function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(ev) {
                document.getElementById('previewImg').src = ev.target.result;
                document.getElementById('uploadArea').classList.add('hidden');
                document.getElementById('memoryPreview').classList.remove('hidden');

                // Try to get EXIF date
                const now = new Date();
                document.getElementById('memoryDate').textContent = formatDate(now);

                // Fetch BPMs from DB for this room
                fetchRecentBpms();
            };
            reader.readAsDataURL(file);
        };

        async function fetchRecentBpms() {
            const sb = getSupabase();
            const { data } = await sb
                .from('heartbeats')
                .select('user_id, bpm')
                .eq('room_id', roomId)
                .order('created_at', { ascending: false })
                .limit(20);

            if (data && data.length > 0) {
                const myBpms = data.filter(d => d.user_id === userId);
                const partnerBpms = data.filter(d => d.user_id !== userId);

                const myAvg = myBpms.length > 0 ? Math.round(myBpms.reduce((s, d) => s + d.bpm, 0) / myBpms.length) : null;
                const partnerAvg = partnerBpms.length > 0 ? Math.round(partnerBpms.reduce((s, d) => s + d.bpm, 0) / partnerBpms.length) : null;

                document.getElementById('memBpmLeft').textContent = myAvg ? myAvg + ' bpm' : '-- bpm';
                document.getElementById('memBpmRight').textContent = partnerAvg ? partnerAvg + ' bpm' : '-- bpm';
            }
        }

        function formatDate(d) {
            const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
            const h = d.getHours(); const m = d.getMinutes();
            const ampm = h >= 12 ? 'PM' : 'AM';
            const h12 = h % 12 || 12;
            return `${months[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()} — ${h12}:${String(m).padStart(2,'0')} ${ampm}`;
        }

        // ---- Save Memory ----
        window.saveMemory = async function() {
            const title = document.getElementById('memoryTitle').value || 'Untitled moment';
            const status = document.getElementById('memoryStatus');
            status.textContent = 'Memory saved.';
            status.classList.remove('hidden');
            status.style.color = 'rgba(244,114,182,0.6)';
            setTimeout(() => status.classList.add('hidden'), 3000);
        };

        window.resetMemory = function() {
            document.getElementById('uploadArea').classList.remove('hidden');
            document.getElementById('memoryPreview').classList.add('hidden');
            document.getElementById('photoInput').value = '';
        };

        // ---- Particles ----
        const canvas = document.getElementById('particles');
        const ctx = canvas.getContext('2d');
        let particles = [];
        function initParticles() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            particles = [];
            const count = Math.floor((canvas.width * canvas.height) / 60000);
            for (let i = 0; i < count; i++) {
                particles.push({
                    x: Math.random()*canvas.width, y: Math.random()*canvas.height,
                    vx: (Math.random()-0.5)*0.2, vy: -0.05-Math.random()*0.15,
                    size: 0.5+Math.random(), opacity: 0.08+Math.random()*0.12,
                    phase: Math.random()*Math.PI*2,
                });
            }
        }
        function drawParticles() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            const t = performance.now()*0.001;
            particles.forEach(p => {
                p.x+=p.vx; p.y+=p.vy;
                if(p.y<-10){p.y=canvas.height+10;p.x=Math.random()*canvas.width;}
                if(p.x<-10)p.x=canvas.width+10; if(p.x>canvas.width+10)p.x=-10;
                const f=0.7+0.3*Math.sin(t*0.5+p.phase);
                ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
                ctx.fillStyle=`rgba(255,255,255,${p.opacity*f})`;ctx.fill();
            });
            requestAnimationFrame(drawParticles);
        }
        window.addEventListener('resize', initParticles);
        initParticles(); drawParticles();
    })();
    </script>
</body>
</html>
